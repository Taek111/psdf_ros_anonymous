# Local costmap parameters for move_base
# Used for local planning and obstacle avoidance

local_costmap:
  global_frame: map
  robot_base_frame: ego_vehicle
  update_frequency: 10.0
  publish_frequency: 10.0
  static_map: false
  rolling_window: true
  width: 8.0
  height: 8.0
  resolution: 0.05
  transform_tolerance: 0.5

  # Explicit plugin stack so local costmap definitely loads obstacle layer
  plugins:
    - {name: static_layer, type: "costmap_2d::StaticLayer"}
    - {name: obstacle_layer, type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

  # Obstacle layer configuration: use /scan from pointcloud_to_laserscan
  obstacle_layer:
    enabled: true
    observation_sources: scan
    scan:
      data_type: LaserScan
      topic: /scan
      marking: true
      clearing: true
      min_obstacle_height: 0.0
      max_obstacle_height: 2.0

  # Override inflation only for local costmap (different from global)
  inflation_layer:
    inflation_radius: 0.01        # tighter local inflation than global (0.38)
    cost_scaling_factor: 2.0      # steeper decay than global (3.0)
