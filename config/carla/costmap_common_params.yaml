# Common costmap parameters for both global and local costmaps
# Used by move_base for navigation planning
global_frame: map
robot_base_frame: ego_vehicle
# Obstacle layer
footprint: [[-0.31, -0.32], [0.31, -0.32], [0.31, 0.32], [-0.31, 0.32]]

# Map type and resolution
map_type: costmap
transform_tolerance: 0.2

# Plugin configuration
plugins:
  - {name: static_layer, type: "costmap_2d::StaticLayer"}
  - {name: obstacle_layer, type: "costmap_2d::ObstacleLayer"}
  - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

# Static layer parameters
static_layer:
  enabled: true
  map_topic: "/map"

# Obstacle layer parameters
obstacle_layer:
  enabled: true
  obstacle_range: 50.0
  raytrace_range: 100.0
  observation_sources: scan
  scan:
    data_type: LaserScan
    topic: /scan
    marking: true
    clearing: false
    min_obstacle_height: 0.0
    max_obstacle_height: 2.0
    inf_is_valid: false

# Inflation layer parameters
  inflation_layer:
    enabled: true
    cost_scaling_factor: 3.0
    inflation_radius: 1.0