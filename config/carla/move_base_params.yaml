controller_frequency: 10.0
planner_frequency: 0.2
planner_patience: 10.0
controller_patience: 15.0
conservative_reset_dist: 3.0
recovery_behavior_enabled: false

# 글로벌 플래너를 SBPL로
base_global_planner: "SBPLLatticePlanner"

# SBPL 파라미터
SBPLLatticePlanner:
  planner_type: "ARAPlanner"            # or "ADPlanner"
  allocated_time: 5.0
  initial_epsilon: 2.0
  environment_type: "XYThetaLattice"    # 이 값만 지원됨
  forward_search: true
  primitive_filename: "/home/taek111/catkin_ws/src/psdf_ros/config/carla/ackermann_05_16.mprim"
  force_scratch_limit: 500
  nominalvel_mpersecs: 6.0              # 글로벌 힌트(속도 스케일)
  timetoturn45degsinplace_secs: 0.30
