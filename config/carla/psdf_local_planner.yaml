vehicle_model: "ackermann"

# Parameters for PSDF-MPC local planner (unified from launch)
horizon: 15
dt: 0.1
# Target spacing [m] between reference points used by MPC
ref_ds: 0.3

optimizer_config_file: "/home/taekwon/catkin_ws/src/psdf_ros/config/carla/psdf_local_planner.yaml"

# Costs
Q: [5.0, 5.0, 1.0] # [v, ω, v̇]
R: [1.0, 1.0]
terminal_weight: 0.2

# Safety and limits
d_safe: 0.001
vmax: 0.8
vmin: -0.5
wheelbase: 3.005
steering_min: -0.6
steering_max: 0.6


# Obstacle/PSDF parameters
max_clusters: 60
max_edges_per_cluster: 4
obstacle_topic: "/obstacles"
line_segment_topic: "/line_segments"

# Frames
robot_base: "ego_vehicle_base"
global_frame: "map"

# Scale for slowdown
min_v_scale : 0.8

# General
service_timeout: 2.0
emergency_stop_on_fail: true
