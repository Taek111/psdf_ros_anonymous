vehicle_model: "ackermann"

# Parameters for PSDF-MPC local planner (unified from launch)
horizon: 15
dt: 0.1
# Target spacing [m] between reference points used by MPC
ref_ds: 0.2

# Costs
Q: [30.0, 30.0, 10.0] # [v, ω, v̇]
R: [1.0, 5.0]
terminal_weight: 0.1

# Safety and limits
d_safe: 0.01
vmax: 1.0
vmin: -1.0
wheel_base: 3.005
steering_min: -1.4
steering_max: 1.4


# Obstacle/PSDF parameters
max_clusters: 20
max_edges_per_cluster: 4
obstacle_topic: "/detected_edges"
line_segment_topic: "/line_segments"

# Frames
robot_base: "ego_vehicle_base"
global_frame: "map"

# Scale for slowdown
min_v_scale : 0.8

# General
service_timeout: 2.0
emergency_stop_on_fail: true