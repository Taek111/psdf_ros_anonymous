robot_info: 
  max_speed: [1, 3.14]
  max_acce: [1, 3.14]
  length: 0.6
  width: 0.62
  wheelbase: 0
  dynamics: diff
  cone_type: Rpositive

# for MPC parameters
receding: 15
iter_num: 4
enable_reverse: true
sample_time: 0.1 # 0.3
process_num: 4
accelerated: True
time_print: False
obstacle_order: True
max_edge_num: 4
max_obs_num: 20
goal_index_threshold: 1

# Tune parameters
iter_threshold: 0.1
slack_gain: 3
max_sd: 0.05
min_sd: 0.001
ws: 10.0  # 0.2 에서 변경
wu: 5.0
ro1: 200
ro2: 1.0

# reference speed
ref_speed: 0.8

# do not use scan
use_scan_obstacle: false
# scan_eps: 0.2
# scan_min_samples: 3

# initialize reference path
waypoints: [[0, 0, 0], [0.1, 0, 0]]
loop: False
curve_type: 'line'
step_size: 0.05
min_radius: 0.0

# for frame
target_frame: map
base_frame: base_link




