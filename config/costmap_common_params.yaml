# Common costmap parameters for both global and local costmaps
# Used by move_base for navigation planning

# Obstacle layer
obstacle_range: 5.0
raytrace_range: 7.0
footprint: [[0.3, 0.30], [0.3, -0.3], [-0.3, -0.3], [-0.3, 0.3]]
inflation_radius: 0.38

# Cost scaling
cost_scaling_factor: 3.0
lethal_cost_threshold: 100

# Map type and resolution
map_type: costmap
transform_tolerance: 0.2

# Plugin configuration
plugins:
  - {name: static_layer, type: "costmap_2d::StaticLayer"}
  - {name: obstacle_layer, type: "costmap_2d::ObstacleLayer"}
  - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

# Static layer parameters
static_layer:
  enabled: true
  map_topic: "/map"

# Obstacle layer parameters
obstacle_layer:
  enabled: true
  max_obstacle_height: 0.6
  origin_z: 0.0
  z_resolution: 0.2
  z_voxels: 2
  unknown_threshold: 15
  mark_threshold: 0
  combination_method: 1
  track_unknown_space: false
  obstacle_range: 2.5
  raytrace_range: 3.0
  origin_z: 0.0
  z_resolution: 0.2
  z_voxels: 2
  publish_voxel_map: false
  observation_sources: scan
  scan:
    data_type: LaserScan
    topic: /scan
    marking: true
    clearing: true
    min_obstacle_height: 0.25
    max_obstacle_height: 0.35

# Inflation layer parameters
inflation_layer:
  enabled: true
  cost_scaling_factor: 3.0
  inflation_radius: 0.38
