# Parameters for PSDF-MPC local planner (unified from launch)
horizon: 15
dt: 0.1
# Target spacing [m] between reference points used by MPC
ref_ds: 0.2

# Costs
Q: [1.0, 1.0, 0.2]
R: [0.2, 1.0]
terminal_weight: 1.0

# Safety and limits
d_safe: 0.1
vmax: 0.5
vmin: -0.5
omegamax: 0.8
omegamin: -0.8

# Obstacle/PSDF parameters
max_clusters: 20
max_edges_per_cluster: 64
obstacle_topic: "/detected_edges"
line_segment_topic: "/line_segments"

# Frames
robot_base: "base_link"
global_frame: "odom"

# General
service_timeout: 2.0
emergency_stop_on_fail: true
