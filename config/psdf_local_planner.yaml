# Parameters for PSDF-MPC local planner
horizon: 15
dt: 0.1
Q: [50.0, 50.0, 1.0]
R: [0.2, 0.05]
terminal_weight: 1.0
d_safe: 0.001
v_max: 0.5
v_min: -0.5
omega_max: 1.2
omega_min: -1.2
accel_lim: 0.2
omega_accel_lim: 0.8
allow_reverse: true
solver_type: "SQP_RTI"
qp_solver: "PARTIAL_CONDENSING_HPIPM"
max_sqp_iter: 20
max_qp_iter: 50
tol: 1e-4
# Obstacle/PSDF parameters
max_clusters: 20
max_edges_per_cluster: 64
local_window_width: 3.0
local_window_height: 3.0
obstacle_safety_margin: 0.05
obstacle_topic: "/detected_edges"
obstacle_topic_type: "edges"
# Frames
frame_id:
  global_frame: "map"
  local_frame: "odom"
  base_frame: "base_link"
# General
service_timeout: 0.2
emergency_stop_on_fail: true
